# ============================================================
# GitHub Actions - Pipeline CI/CD Propax
# Fichier : .github/workflows/ci-cd.yml
#
# Déclencheurs :
#   - Push sur la branche main  → CI + CD (déploiement prod)
#   - Push sur develop          → CI uniquement (tests + build)
#   - Pull Request vers main    → CI (validation avant merge)
#
# Étapes du pipeline :
#   1. CI  : lint + tests + build Docker images
#   2. CD  : push images sur GHCR + déploiement SSH sur serveur
# ============================================================

name: CI/CD Propax

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  # ══════════════════════════════════════════════════════════
  # JOB 1 - CI : Intégration Continue
  # Tests, lint et vérification du build
  # ══════════════════════════════════════════════════════════
  ci:
    name: "CI - Tests & Build"
    runs-on: ubuntu-latest

    steps:
      # ── 1. Récupération du code source ──────────────────
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Préparer les noms d'images GHCR
        id: image_meta
        run: |
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "frontend=${{ env.REGISTRY }}/${owner}/propax-frontend" >> "$GITHUB_OUTPUT"
          echo "backend=${{ env.REGISTRY }}/${owner}/propax-backend" >> "$GITHUB_OUTPUT"

      # ── 2. Installation de Node.js ───────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      # ── 3. Installation des dépendances Frontend ─────────
      - name: Installer les dépendances client
        working-directory: ./client
        run: npm ci

      # ── 4. Lint du code React ────────────────────────────
      - name: Lint client (ESLint)
        working-directory: ./client
        run: npm run build --if-present
        # Note : react-scripts build intègre ESLint automatiquement
        # Ajouter "lint": "eslint src" dans package.json pour un lint dédié

      # ── 5. Tests unitaires React ─────────────────────────
      - name: Tests unitaires client
        working-directory: ./client
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      # ── 6. Installation des dépendances Backend ──────────
      - name: Installer les dépendances serveur
        working-directory: ./server
        run: npm ci

      # ── 7. Tests backend (à implémenter) ─────────────────
      - name: Tests serveur
        working-directory: ./server
        run: npm test --if-present || echo "Aucun test serveur configuré"

      # ── 8. Build de l'image Docker Frontend ──────────────
      - name: Build Docker image frontend
        run: |
          docker build \
            --tag ${{ steps.image_meta.outputs.frontend }}:${{ github.sha }} \
            --tag ${{ steps.image_meta.outputs.frontend }}:latest \
            ./client

      # ── 9. Build de l'image Docker Backend ───────────────
      - name: Build Docker image backend
        run: |
          docker build \
            --tag ${{ steps.image_meta.outputs.backend }}:${{ github.sha }} \
            --tag ${{ steps.image_meta.outputs.backend }}:latest \
            ./server

  # ══════════════════════════════════════════════════════════
  # JOB 2 - CD : Déploiement Continu (main uniquement)
  # Push sur GHCR + déploiement SSH en production
  # ══════════════════════════════════════════════════════════
  cd:
    name: "CD - Deploy Production"
    runs-on: ubuntu-latest
    needs: ci # Démarre seulement si CI réussit
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      # ── 1. Récupération du code source ──────────────────
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Préparer les noms d'images GHCR
        id: image_meta
        run: |
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "frontend=${{ env.REGISTRY }}/${owner}/propax-frontend" >> "$GITHUB_OUTPUT"
          echo "backend=${{ env.REGISTRY }}/${owner}/propax-backend" >> "$GITHUB_OUTPUT"

      # ── 2. Authentification sur GitHub Container Registry ─
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 3. Build & Push image Frontend ──────────────────
      - name: Build & Push image Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ steps.image_meta.outputs.frontend }}:latest
            ${{ steps.image_meta.outputs.frontend }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # ── 4. Build & Push image Backend ───────────────────
      - name: Build & Push image Backend
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ steps.image_meta.outputs.backend }}:latest
            ${{ steps.image_meta.outputs.backend }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # ── 5. Déploiement Backend sur Scalingo ─────────────
      # Prérequis : secrets GitHub configurés dans les paramètres du repo
      #   - SCALINGO_API_TOKEN  : token API Scalingo (Account → API Tokens)
      #   - SCALINGO_APP_NAME   : nom de l'app Scalingo (ex: propax-backend)
      - name: Déploiement Backend sur Scalingo
        run: |
          # Installer la CLI Scalingo
          curl -O https://cli-dl.scalingo.com/install && bash install

          # Déployer l'image Docker du backend sur Scalingo
          scalingo --app ${{ secrets.SCALINGO_APP_NAME }} \
            --token ${{ secrets.SCALINGO_API_TOKEN }} \
            deploy ${{ steps.image_meta.outputs.backend }}:${{ github.sha }}

          echo "Déploiement Scalingo Propax ${{ github.sha }} réussi ✓"

  # ══════════════════════════════════════════════════════════
  # JOB 3 - Notification (optionnel)
  # ══════════════════════════════════════════════════════════
  notify:
    name: "Notification déploiement"
    runs-on: ubuntu-latest
    needs: [ci, cd]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Résumé du pipeline
        run: |
          echo "## Résumé CI/CD Propax" >> $GITHUB_STEP_SUMMARY
          echo "| Étape | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CI (Tests + Build) | ${{ needs.ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CD (Déploiement)   | ${{ needs.cd.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit             | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branche            | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
