# ============================================================
# docker-compose.yml - Propax
# Orchestration des 3 services :
#   - db       : MySQL 8
#   - backend  : API Node.js/Express
#   - frontend : React + Nginx
# ============================================================

services:
  # ── Base de données MySQL ─────────────────────────────────
  db:
    image: mysql:8.0
    container_name: propax-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306" # 3307 côté hôte pour éviter les conflits
    volumes:
      - mysql_data:/var/lib/mysql # persistance des données
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro # script d'init
    networks:
      - propax-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "${DB_USER}",
          "-p${DB_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── API Backend Node.js ───────────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: propax-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - propax-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/test"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend React + Nginx ────────────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: propax-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - propax-network

# ── Volumes persistants ───────────────────────────────────
volumes:
  mysql_data:
    driver: local

# ── Réseau interne isolé ──────────────────────────────────
networks:
  propax-network:
    driver: bridge
