# ============================================================
# Configuration Nginx - Frontend React (Propax)
# Rôles :
#   - Servir les fichiers statiques React
#   - Gérer le routing côté client (SPA)
#   - Proxy inverse vers l'API backend
#   - Headers de sécurité
# ============================================================

server {
    listen 80;
    server_name _;

    # Dossier racine du build React
    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip pour les assets statiques
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # ---- Headers de sécurité ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Pas de cache pour index.html (entry point SPA) ----
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ---- Cache des assets statiques ----
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- Proxy vers l'API backend ----
    # Toutes les requêtes /api/* sont redirigées vers le container backend
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;
    }

    # ---- SPA React (client-side routing) ----
    # Toutes les routes inconnues retournent index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Désactiver l'accès aux fichiers cachés ----
    location ~ /\. {
        deny all;
        return 404;
    }
}
